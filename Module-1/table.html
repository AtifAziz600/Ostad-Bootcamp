<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <caption>Student Information</caption>
        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Number</th>
        </tr>
        <tr>
            <td colspan="2">Alice</td>
            <td>10</td>
            <td>12345</td>
        </tr>
        <tr>
            <td rowspan="2">Bob</td>
            <td>11</td>
            <td>67890</td>
        </tr>
        <tr>
            <td>Charlie</td>
            <td>12</td>
            <td>54321</td>
        </tr>
    </table>
</body>
</html>
