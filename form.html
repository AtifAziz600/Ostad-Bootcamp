<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="fname">First Name</label>
        <br>
        <input type="text" id="fname" name="firstname" placeholder="Enter your first name" required>
        <br>
        <label for="lname">Last Name</label>
        <br>
        <input type="text" id="lname" name="lastname" placeholder="Enter your last name" required>
        <br>
        <label for="email">Email</label>
        <br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>
        <label for="password">Password</label>
        <br>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <br>
        <label for="gender">Gender</label>
        <br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
        <br>
        <select name="date" id="date">
            
        </select>
        <br>
        <input type="checkbox" id="reading" name="hobbies" value="reading">
        <br>
        <label for="reading">Reading</label>
        <input type="checkbox" id="sports" name="hobbies" value="sports">
        <label for="sports">Sports</label>
        <input type="checkbox" id="music" name="hobbies" value="music">
        <label for="music">Music</label>
        <br>
        <label for="country">Country</label>
        <br>
        <select id="country" name="country">
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
        </select>
        <br>
        <label for="message">Message</label>
        <br>
        <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message"></textarea>
        <br>
        <input type="submit" value="Submit">


    </form>
</body>
</html>
