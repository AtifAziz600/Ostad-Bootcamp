<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

<!-- Header -->
<header class="bg-white shadow-2xl py-5">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-4">

        <!-- Logo -->
        <h1 class="text-2xl font-bold">MiniBlog</h1>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex gap-6 text-gray-700 font-medium">
            <a href="index.html" class="hover:text-blue-600">Home</a>
            <a href="about.html" class="hover:text-blue-600">About</a>
            <a href="contact.html" class="hover:text-blue-600">Contact</a>
        </nav>

        <!-- Hamburger Button -->
        <button id="menuBtn" class="md:hidden text-2xl">
            ☰
        </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden bg-white border-t">
        <nav class="flex flex-col gap-4 p-4 text-gray-700 font-medium">
            <a href="index.html" class="hover:text-blue-600">Home</a>
            <a href="about.html" class="hover:text-blue-600">About</a>
            <a href="contact.html" class="hover:text-blue-600">Contact</a>
        </nav>
    </div>
</header>

<main>
    <section class="max-w-500 mx-auto py-10 px-4">

    </section>
</main>

<!-- JS for Toggle -->
<script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
    });
</script>

</body>
</html>
