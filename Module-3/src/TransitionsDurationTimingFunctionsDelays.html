<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Transitions</title>
  <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="space-y-6">
<button class="bg-purple-200 text-purple-600 px-[30px] py-[20px] rounded-md hover:bg-purple-500 cursor-pointer hover:text-white transition duration-300 ease-in">Click Me</button>
<button class="bg-purple-200 text-purple-600 px-[30px] py-[20px] rounded-md hover:bg-purple-500 cursor-pointer hover:text-white transition duration-300 delay-200">Click Me</button>
    <!-- ================= Duration ================= -->
    <button
      class="px-6 py-3 bg-blue-500 text-white rounded-lg
      transition-all duration-200 hover:bg-blue-700"
    >
      Duration 200ms
    </button>

    <button
      class="px-6 py-3 bg-green-500 text-white rounded-lg
      transition-all duration-500 hover:bg-green-700"
    >
      Duration 500ms
    </button>

    <button
      class="px-6 py-3 bg-purple-500 text-white rounded-lg
      transition-all duration-1000 hover:bg-purple-700"
    >
      Duration 1000ms
    </button>

    <!-- ================= Timing Functions ================= -->
    <div class="flex gap-4">

      <button
        class="px-6 py-3 bg-red-500 text-white rounded-lg
        transition-all duration-500 ease-linear hover:scale-110"
      >
        ease-linear
      </button>

      <button
        class="px-6 py-3 bg-yellow-500 text-black rounded-lg
        transition-all duration-500 ease-in hover:scale-110"
      >
        ease-in
      </button>

      <button
        class="px-6 py-3 bg-indigo-500 text-white rounded-lg
        transition-all duration-500 ease-out hover:scale-110"
      >
        ease-out
      </button>

      <button
        class="px-6 py-3 bg-pink-500 text-white rounded-lg
        transition-all duration-500 ease-in-out hover:scale-110"
      >
        ease-in-out
      </button>

    </div>

    <!-- ================= Delay ================= -->
    <button
      class="px-6 py-3 bg-gray-800 text-white rounded-lg
      transition-all duration-500 delay-300 hover:bg-gray-600"
    >
      Delay 300ms
    </button>

  </div>

</body>
</html>
