<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="flex gap-[30px]">
        <div class="bg-amber-800 p-4 shadow shadow-amber-700">Hello</div>
        <div class=" bg-cyan-500 p-4 shadow-md shadow-cyan-800">Hello</div>
        <div class="inset-shadow-sm inset-shadow-indigo-500 p-4">Hello</div>
        <div class="insert-shadow-xs p-4 opacity-75">Hello</div>
        <div class="insert-shadow-sm p-4">Hello</div>
    </div>
     <div class="space-y-6">

    <!-- Basic Shadow -->
    <div class="bg-white p-6 rounded-lg shadow">
      <p class="text-gray-700">Default Shadow</p>
    </div>

    <!-- Medium Shadow -->
    <div class="bg-white p-6 rounded-lg shadow-md">
      <p class="text-gray-700">Medium Shadow</p>
    </div>

    <!-- Large Shadow -->
    <div class="bg-white p-6 rounded-lg shadow-lg">
      <p class="text-gray-700">Large Shadow</p>
    </div>

    <!-- Extra Large Shadow -->
    <div class="bg-white p-6 rounded-lg shadow-2xl">
      <p class="text-gray-700">Extra Large Shadow</p>
    </div>

    <!-- Shadow with Opacity -->
    <div class="bg-blue-500 p-6 rounded-lg shadow-lg opacity-70">
      <p class="text-white">Box with Opacity (70%)</p>
    </div>

    <!-- Hover Shadow + Opacity Transition -->
    <div class="bg-green-500 p-6 rounded-lg shadow-md opacity-80 hover:opacity-100 hover:shadow-xl transition-all duration-300">
      <p class="text-white">Hover Effect (Shadow + Opacity)</p>
    </div>

  </div>
</body>
</html>
